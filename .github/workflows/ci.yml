name: Android CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Unit tests
        run: ./gradlew test --no-daemon

      - name: Android lint (devDebug)
        run: ./gradlew :app:lintDevDebug --no-daemon

      - name: Build debug APK
        run: ./gradlew assembleDevDebug --no-daemon

      - name: Build CI summary
        if: always()
        run: |
          set +e
          test_xml_count=$(find . -path "*/build/test-results/*/*.xml" | wc -l | tr -d ' ')
          failed_count=$(grep -R "<failure" -n . --include="*.xml" | wc -l | tr -d ' ')
          lint_issue_count=$(grep -R "<issue " -n . --include="lint-results*.xml" | wc -l | tr -d ' ')
          apk_path="app/build/outputs/apk/dev/debug/app-dev-debug.apk"
          if [ -f "$apk_path" ]; then
            apk_size=$(du -h "$apk_path" | awk '{print $1}')
          else
            apk_size="N/A"
          fi

          {
            echo "## Android CI Summary"
            echo ""
            echo "| Metric | Value |"
            echo "|---|---|"
            echo "| Test result XML files | ${test_xml_count} |"
            echo "| Test failure tags | ${failed_count} |"
            echo "| Lint issue tags | ${lint_issue_count} |"
            echo "| APK size (devDebug) | ${apk_size} |"
            echo ""
            echo "Artifacts: app-dev-debug / unit-test-reports / lint-reports"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-dev-debug
          path: app/build/outputs/apk/dev/debug/app-dev-debug.apk
          retention-days: 14

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
          retention-days: 14

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: |
            **/build/reports/lint-results*.html
            **/build/reports/lint-results*.xml
          retention-days: 14
