# Detekt configuration for RikkaAgent
# https://detekt.dev/docs/gettingstarted/gradle

build:
  maxIssues: 0
  excludeCorrectable: false

complexity:
  LongMethod:
    threshold: 60
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 10
  ComplexMethod:
    threshold: 15
  TooManyFunctions:
    thresholdInFiles: 25
    thresholdInClasses: 25

style:
  MaxLineLength:
    maxLineLength: 120
  MagicNumber:
    active: false
  ReturnCount:
    max: 3
  ForbiddenComment:
    active: false
  WildcardImport:
    active: false

naming:
  FunctionNaming:
    functionPattern: '[a-z][a-zA-Z0-9]*'
  ClassNaming:
    classPattern: '[A-Z][a-zA-Z0-9]*'
  TopLevelPropertyNaming:
    constantPattern: '[A-Z][A-Z0-9_]*'

empty-blocks:
  EmptyFunctionBlock:
    ignoreOverridden: true

exceptions:
  TooGenericExceptionCaught:
    active: false

potential-bugs:
  UnsafeCallOnNullableType:
    active: false
