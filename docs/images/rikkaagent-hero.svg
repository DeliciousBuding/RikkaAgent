      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#052e16" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
  </defs>

  <rect width="1200" height="420" fill="url(#bg)" rx="20" ry="20" />
  <circle cx="1080" cy="80" r="120" fill="#10b981" opacity="0.12" />
  <circle cx="160" cy="340" r="140" fill="#22d3ee" opacity="0.1" />

  <rect x="70" y="78" width="560" height="250" rx="18" fill="#0b1220" opacity="0.9" stroke="#334155" />
  <rect x="95" y="105" width="220" height="24" rx="8" fill="#1e293b" />
  <rect x="95" y="145" width="480" height="16" rx="6" fill="#111827" />
