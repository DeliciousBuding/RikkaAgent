  <rect x="95" y="235" width="210" height="34" rx="10" fill="url(#accent)" opacity="0.85" />

  <text x="680" y="165" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="58" font-weight="700">RikkaAgent</text>
